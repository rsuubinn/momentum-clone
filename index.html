<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Momentum</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="js-logo">
      <img class="logo" src="images/logo/github.png" />
    </div>

    <div class="js-weather weather">
      <div class="js-temperature temperature"></div>
      <div class="js-place place"></div>
    </div>
    <div class="js-clock clock">
      <div class="clock-title"></div>
    </div>

    <form class="js-greeting greeting">
      <h3 class="greeting-title">Hello, what's your name?</h3>
      <input class="greeting-input" type="text" />
      <button class="greeting-button">Continue</button>
    </form>

    <h4 class="js-greetingUser greetingUser"></h4>

    <form class="js-toDoForm toDoForm">
      <h3 class="toDoForm-title">What is your main focus today?</h3>
      <input class="toDoForm-input" type="text" />
    </form>

    <ul class="js-toDoList toDoList"></ul>

    <script src="clock.js"></script>
    <script src="greeting.js"></script>
    <script src="todo.js"></script>
    <script src="wallpaper.js"></script>
    <script src="weather.js"></script>
    <script src="logo.js"></script>
  </body>
</html>
